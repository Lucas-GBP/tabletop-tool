name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    name: Check (Lint & Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          node-version: 26.1.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - run: npm ci
      - run: npm run check
